services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: vaultpass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - vaultpass_mysql:/var/lib/mysql

  web:
    build: .
    depends_on:
      - db
    ports:
      - "8000:80"
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: vaultpass
      DB_USER: root
      DB_PASS: root
      APP_KEY: replace-with-a-long-random-secret
      SESSION_COOKIE_SECURE: "false"
      SESSION_SAMESITE: Lax
      ZERO_KNOWLEDGE_CLIENT_ENCRYPTION: "false"

volumes:
  vaultpass_mysql:

