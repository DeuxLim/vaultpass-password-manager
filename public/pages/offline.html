<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultPass Offline</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      max-width: 460px;
      width: 100%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      background: #fff;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 16px;
      color: #5e5e65;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      text-decoration: none;
      border: 1px solid #0071e3;
      color: #0071e3;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>
      VaultPass does not cache vault API responses offline for security.
      If you enabled the optional offline encrypted cache (zero-knowledge mode), your device may still be able to show a cached snapshot.
      Reconnect to ensure you have the latest records.
    </p>
    <a href="/">Go to Home</a>
  </main>
</body>
</html>
